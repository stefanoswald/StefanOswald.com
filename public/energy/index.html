<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy for Energy — The app you can't live without</title>
<meta name="description" content="Exchange skills, resources, and knowledge with your community. Energy for Energy is a community-powered reciprocity platform.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000000'/%3E%3Cpath d='M57 6 L22 56 L42 56 L40 94 L78 40 L55 40 Z' fill='%23ff8c42'/%3E%3C/svg%3E">
<style>
:root{
  --indigo:#1b1339; --indigo-2:#2a1d5c; --indigo-3:#3b2a80;
  --gold:#f5a623; --gold-2:#ff8c42; --gold-3:#ffd166;
  --teal:#14b8a6; --teal-2:#0d9488;
  --purple:#8b5cf6; --pink:#ec4899;
  --bg:#faf8f4; --surface:#ffffff; --ink:#221a3f; --muted:#6b6485;
  --line:#eae6f2; --shadow:0 4px 24px rgba(27,19,57,.08);
  --shadow-lg:0 12px 40px rgba(27,19,57,.14);
  --grad-hero:linear-gradient(135deg,#1b1339 0%,#2a1d5c 45%,#3b2a80 100%);
  --grad-gold:linear-gradient(135deg,#f5a623,#ff8c42);
  --grad-teal:linear-gradient(135deg,#14b8a6,#0ea5e9);
  --grad-purple:linear-gradient(135deg,#8b5cf6,#ec4899);
  --radius:16px; --radius-lg:24px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,.brand{font-family:'Sora','Inter',sans-serif}
img{max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ---------- Nav ---------- */
.nav{position:sticky;top:0;z-index:50;background:rgba(250,248,244,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:24px;padding:14px 24px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.15rem;letter-spacing:-.02em;cursor:pointer}
.brand .bolt{width:38px;height:38px;border-radius:12px;background:#000;display:grid;place-items:center;box-shadow:0 4px 14px rgba(255,140,66,.4)}
.brand .bolt svg{width:38px;height:38px;display:block}
.nav-links{display:flex;gap:4px;margin-left:auto;align-items:center}
.nav-link{padding:8px 14px;border-radius:10px;font-weight:600;font-size:.92rem;color:var(--muted);transition:.18s;cursor:pointer;background:none;border:none}
.nav-link:hover{color:var(--ink);background:#f0edf7}
.nav-link.active{color:var(--indigo-3);background:#eee9fb}
.hamburger{display:none;margin-left:auto;background:none;border:none;font-size:1.5rem;color:var(--ink)}
.mobile-menu{display:none}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:12px;padding:12px 22px;font-weight:700;font-size:.95rem;transition:.18s;text-align:center;justify-content:center}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--grad-gold);color:#fff;box-shadow:0 6px 18px rgba(245,166,35,.38)}
.btn-gold:hover{box-shadow:0 8px 24px rgba(245,166,35,.5);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.35);backdrop-filter:blur(6px)}
.btn-ghost:hover{background:rgba(255,255,255,.22)}
.btn-outline{background:var(--surface);color:var(--indigo-3);border:1.5px solid #d8d2ea}
.btn-outline:hover{border-color:var(--indigo-3);background:#f6f3fc}
.btn-teal{background:var(--grad-teal);color:#fff;box-shadow:0 6px 18px rgba(20,184,166,.35)}
.btn-teal:hover{transform:translateY(-1px)}
.btn-sm{padding:8px 14px;font-size:.85rem;border-radius:10px}
.btn-block{width:100%}

/* ---------- Hero ---------- */
.hero{background:var(--grad-hero);color:#fff;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.25),transparent 70%);top:-200px;right:-150px}
.hero::after{content:"";position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(20,184,166,.2),transparent 70%);bottom:-250px;left:-120px}
.hero-inner{max-width:1200px;margin:0 auto;padding:84px 24px 96px;position:relative;z-index:1;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:7px 18px;font-size:.85rem;font-weight:600;letter-spacing:.03em;margin-bottom:28px}
.hero h1{font-size:clamp(2.4rem,5.5vw,4.2rem);font-weight:800;letter-spacing:-.03em;line-height:1.08;margin-bottom:18px}
.hero h1 .grad{background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .sub{font-size:clamp(1.05rem,2vw,1.3rem);color:#cfc7e8;max-width:640px;margin:0 auto 36px;font-weight:500}
.hero-ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.hero-stats{display:flex;gap:48px;justify-content:center;margin-top:64px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat .num{font-family:'Sora';font-size:2rem;font-weight:800;background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-stat .lbl{font-size:.85rem;color:#b7ade0;font-weight:600;letter-spacing:.04em;text-transform:uppercase}

/* ---------- Sections ---------- */
.section{max-width:1200px;margin:0 auto;padding:72px 24px}
.section-head{text-align:center;max-width:640px;margin:0 auto 44px}
.kicker{display:inline-block;font-size:.8rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-2);margin-bottom:10px}
.section-head h2{font-size:clamp(1.7rem,3.4vw,2.4rem);font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
.section-head p{color:var(--muted);font-size:1.05rem}
.left .section-head,.section-head.left{text-align:left;margin-left:0}

/* ---------- Category cards ---------- */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.cat-card{background:var(--surface);border-radius:var(--radius-lg);padding:34px 28px;box-shadow:var(--shadow);border:1px solid var(--line);transition:.22s;cursor:pointer;position:relative;overflow:hidden}
.cat-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg)}
.cat-card .icon{width:58px;height:58px;border-radius:16px;display:grid;place-items:center;font-size:1.7rem;margin-bottom:20px;color:#fff}
.cat-card h3{font-size:1.25rem;font-weight:700;margin-bottom:10px}
.cat-card p{color:var(--muted);font-size:.95rem;margin-bottom:18px}
.cat-card .link{font-weight:700;color:var(--indigo-3);font-size:.92rem}

/* ---------- How it works ---------- */
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.step{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:28px 24px;box-shadow:var(--shadow)}
.step .n{width:40px;height:40px;border-radius:50%;background:var(--grad-purple);color:#fff;display:grid;place-items:center;font-weight:800;font-family:'Sora';margin-bottom:16px}
.step h4{font-size:1.05rem;margin-bottom:8px;font-weight:700}
.step p{color:var(--muted);font-size:.9rem}

/* ---------- Listing cards ---------- */
.listing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:22px}
.lcard{background:var(--surface);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);transition:.22s;cursor:pointer;display:flex;flex-direction:column}
.lcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.lcard .thumb{height:150px;display:grid;place-items:center;font-size:3.2rem;color:#fff;position:relative}
.lcard .extype{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.92);color:var(--indigo);font-size:.72rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px}
.lcard .body{padding:18px;display:flex;flex-direction:column;gap:8px;flex:1}
.lcard .cat{font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-2)}
.lcard h3{font-size:1.06rem;font-weight:700;letter-spacing:-.01em}
.lcard .loc{font-size:.84rem;color:var(--muted);display:flex;align-items:center;gap:5px}
.lcard .desc{font-size:.87rem;color:var(--muted);flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lcard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:12px;border-top:1px solid var(--line)}
.lcard .price{font-weight:800;color:var(--indigo-3);font-size:.96rem}
.lcard .price.energy{color:var(--teal-2)}

/* ---------- Chips / filters ---------- */
.filterbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:28px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:9px 16px;border-radius:999px;border:1.5px solid #ddd6ee;background:var(--surface);font-weight:600;font-size:.87rem;color:var(--muted);transition:.15s}
.chip:hover{border-color:var(--indigo-3);color:var(--indigo-3)}
.chip.active{background:var(--indigo);border-color:var(--indigo);color:#fff}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-wrap input{width:100%;padding:12px 16px 12px 42px;border-radius:12px;border:1.5px solid #ddd6ee;background:var(--surface);font-size:.95rem;font-family:inherit;outline:none;transition:.15s}
.search-wrap input:focus{border-color:var(--indigo-3);box-shadow:0 0 0 3px rgba(59,42,128,.12)}
.search-wrap .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
select.chip-select{padding:10px 14px;border-radius:12px;border:1.5px solid #ddd6ee;background:var(--surface);font-weight:600;font-size:.87rem;color:var(--ink);font-family:inherit;outline:none;cursor:pointer}

/* ---------- Workshops ---------- */
.wcard{display:flex;gap:18px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);transition:.2s;cursor:pointer;align-items:flex-start}
.wcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.wcard .thumb{width:76px;height:76px;min-width:76px;border-radius:18px;display:grid;place-items:center;font-size:2rem;color:#fff}
.wcard h3{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.wcard .meta{font-size:.83rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.wcard .desc{font-size:.88rem;color:var(--muted)}
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.tag{display:inline-block;font-size:.72rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:999px;margin-bottom:8px}
.tag.online{background:#e0f5f3;color:var(--teal-2)}
.tag.inperson{background:#fdeeda;color:#c47a12}
.tag.mastermind{background:#efe9fd;color:#6d3fd4}

/* ---------- Profile ---------- */
.profile-head{background:var(--grad-hero);border-radius:var(--radius-lg);padding:40px;color:#fff;display:flex;gap:28px;align-items:center;flex-wrap:wrap;position:relative;overflow:hidden}
.profile-head::before{content:"";position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.25),transparent 70%);top:-150px;right:-100px}
.avatar{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;font-size:2.6rem;background:var(--grad-gold);border:4px solid rgba(255,255,255,.3);position:relative;z-index:1}
.avatar.sm{width:44px;height:44px;font-size:1.2rem;border-width:2px}
.profile-info{flex:1;min-width:220px;position:relative;z-index:1}
.profile-info h2{font-size:1.7rem;margin-bottom:4px}
.profile-info .loc{color:#cfc7e8;font-size:.95rem;margin-bottom:10px}
.trust{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border-radius:999px;padding:6px 14px;font-size:.88rem;font-weight:700}
.trust .stars{color:var(--gold-3)}
.profile-cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:24px}
.pbox{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow)}
.pbox h4{font-size:.8rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-2);margin-bottom:14px}
.pbox ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.pbox li{font-size:.92rem;display:flex;gap:8px;align-items:baseline}
.pbox li::before{content:"⚡";font-size:.75rem}
.review{border-top:1px solid var(--line);padding-top:12px;margin-top:12px}
.review:first-of-type{border:none;padding:0;margin:0}
.review .who{font-weight:700;font-size:.88rem}
.review .txt{font-size:.87rem;color:var(--muted)}
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
.pcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:.2s}
.pcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.pcard .avatar{margin:0 auto 14px}
.pcard h3{font-size:1.02rem}
.pcard .role{color:var(--gold-2);font-weight:700;font-size:.85rem;margin-bottom:6px}
.pcard .loc{font-size:.82rem;color:var(--muted)}

/* ---------- Forms ---------- */
.form-card{max-width:680px;margin:0 auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:36px;box-shadow:var(--shadow)}
.fgroup{margin-bottom:20px}
.fgroup label{display:block;font-weight:700;font-size:.9rem;margin-bottom:7px}
.fgroup input,.fgroup select,.fgroup textarea{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #ddd6ee;font-family:inherit;font-size:.95rem;outline:none;transition:.15s;background:#fff}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{border-color:var(--indigo-3);box-shadow:0 0 0 3px rgba(59,42,128,.12)}
.fgroup textarea{resize:vertical;min-height:100px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.upload-box{border:2px dashed #cfc6e6;border-radius:var(--radius);padding:28px;text-align:center;color:var(--muted);cursor:pointer;transition:.15s;font-size:.92rem}
.upload-box:hover{border-color:var(--indigo-3);color:var(--indigo-3)}
.upload-box .big{font-size:2rem;display:block;margin-bottom:6px}
.ex-pills{display:flex;gap:8px;flex-wrap:wrap}
.ex-pill{padding:9px 16px;border-radius:999px;border:1.5px solid #ddd6ee;background:#fff;font-weight:600;font-size:.85rem;color:var(--muted);transition:.15s}
.ex-pill.active{background:var(--grad-gold);border-color:transparent;color:#fff}
.hint{font-size:.8rem;color:var(--muted);margin-top:5px}

/* ---------- Modal ---------- */
.modal-back{position:fixed;inset:0;background:rgba(27,19,57,.55);backdrop-filter:blur(4px);z-index:100;display:grid;place-items:center;padding:20px;animation:fade .2s}
.modal{background:var(--surface);border-radius:var(--radius-lg);max-width:520px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow-lg);animation:pop .22s}
.modal .thumb{height:170px;display:grid;place-items:center;font-size:4rem;color:#fff;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.modal .inner{padding:28px}
.modal h3{font-size:1.35rem;margin-bottom:6px}
.modal .close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.9);border:none;width:36px;height:36px;border-radius:50%;font-size:1.1rem;z-index:2}
@keyframes fade{from{opacity:0}}
@keyframes pop{from{opacity:0;transform:scale(.94) translateY(10px)}}

/* ---------- Toast ---------- */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--indigo);color:#fff;padding:14px 24px;border-radius:14px;font-weight:600;box-shadow:var(--shadow-lg);z-index:200;display:flex;align-items:center;gap:10px;animation:rise .3s}
@keyframes rise{from{opacity:0;transform:translate(-50%,16px)}}

/* ---------- CTA band & footer ---------- */
.cta-band{background:var(--grad-hero);border-radius:var(--radius-lg);padding:56px 40px;text-align:center;color:#fff;position:relative;overflow:hidden}
.cta-band::before{content:"";position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.3),transparent 70%);top:-200px;left:50%;transform:translateX(-50%)}
.cta-band h2{font-size:clamp(1.6rem,3vw,2.2rem);margin-bottom:12px;position:relative}
.cta-band p{color:#cfc7e8;margin-bottom:28px;position:relative}
footer{background:var(--indigo);color:#b7ade0;margin-top:72px}
.foot-inner{max-width:1200px;margin:0 auto;padding:48px 24px 32px;display:flex;justify-content:space-between;gap:32px;flex-wrap:wrap}
.foot-inner .brand{color:#fff}
.foot-links{display:flex;gap:28px;flex-wrap:wrap;font-size:.9rem}
.foot-links span{cursor:pointer;transition:.15s}
.foot-links span:hover{color:#fff}
.foot-bottom{text-align:center;font-size:.8rem;padding:0 24px 28px;color:#8d80bb}

/* ---------- Autocomplete ---------- */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #ddd6ee;border-radius:12px;box-shadow:var(--shadow-lg);z-index:60;max-height:224px;overflow:auto;display:none}
.ac-list.open{display:block}
.ac-item{padding:10px 14px;cursor:pointer;font-size:.92rem}
.ac-item:hover,.ac-item.hi{background:#f6f3fc;color:var(--indigo-3);font-weight:600}

/* ---------- Energy / trade picker ---------- */
.or-divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:var(--muted);font-weight:800;font-family:'Sora';letter-spacing:.1em}
.or-divider::before,.or-divider::after{content:"";flex:1;height:1.5px;background:var(--line)}
.energy-row{display:flex;gap:12px}
.energy-row input{flex:1}
.energy-row select{width:auto;min-width:130px}
.trade-box{border:1.5px solid #ddd6ee;border-radius:12px;padding:12px;min-height:58px;background:#fff;display:flex;flex-direction:column;gap:8px}
.trade-box .ph{color:var(--muted);font-size:.88rem;align-self:center;margin:auto}
.trade-row{display:flex;align-items:center;gap:10px;background:#f6f3fc;border-radius:10px;padding:7px 12px;font-size:.88rem;font-weight:600;flex-wrap:wrap}
.trade-row .nm{flex:1;min-width:120px}
.qty-btn{width:26px;height:26px;border-radius:8px;border:1.5px solid #cfc6e6;background:#fff;font-weight:800;color:var(--indigo-3);line-height:1}
.trade-row .x{background:none;border:none;color:var(--muted);font-size:1rem}
.trade-row .x:hover{color:#d33}
.trade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px;margin-top:12px}
.trade-btn{padding:9px 10px;border-radius:10px;border:1.5px solid #ddd6ee;background:#fff;font-size:.8rem;font-weight:600;color:var(--muted);transition:.13s}
.trade-btn:hover{border-color:var(--indigo-3);color:var(--indigo-3)}
.trade-btn.sel{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.energy-note{background:linear-gradient(135deg,#fdf3e3,#fdeeda);border:1px solid #f5d9a8;border-radius:14px;padding:14px 18px;font-size:.87rem;margin-bottom:22px}
.energy-note b{color:#b06f0a}

/* ---------- Map ---------- */
.map-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow);margin-bottom:28px}
.map-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.map-head h3{font-size:1.05rem}
#mapBox{height:340px;border-radius:14px;background:#eee9fb;display:grid;place-items:center;color:var(--muted);font-size:.9rem}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big{font-size:3rem;display:block;margin-bottom:12px}
.page-hero{background:var(--grad-hero);color:#fff;padding:52px 24px;text-align:center}
.page-hero h1{font-size:clamp(1.8rem,4vw,2.6rem);letter-spacing:-.02em;margin-bottom:8px}
.page-hero p{color:#cfc7e8;max-width:560px;margin:0 auto}
.count-note{font-size:.88rem;color:var(--muted);margin-bottom:16px}

@media(max-width:760px){
  .nav-links{display:none}
  .hamburger{display:block}
  .mobile-menu.open{display:flex;flex-direction:column;padding:8px 16px 16px;gap:4px;border-top:1px solid var(--line)}
  .mobile-menu .nav-link{text-align:left;padding:12px 14px}
  .frow{grid-template-columns:1fr}
  .hero-inner{padding:56px 20px 64px}

function initAutocomplete(){
  document.querySelectorAll('input[data-ac]').forEach(input=>{
    const list = input.parentElement.querySelector('.ac-list');
    if(!list || input._acBound) return;
    input._acBound = true;
    const close = ()=>list.classList.remove('open');
    input.addEventListener('input', ()=>{
      const q = input.value.trim().toLowerCase();
      if(q.length < 2){ close(); return; }
      const hits = LOCATIONS.filter(c=>c.toLowerCase().includes(q)).slice(0,6);
      if(!hits.length){ close(); return; }
      list.innerHTML = hits.map(c=>`<div class="ac-item">${esc(c)}</div>`).join('');
      list.querySelectorAll('.ac-item').forEach(el=>el.addEventListener('mousedown', ev=>{
        ev.preventDefault(); input.value = el.textContent; close();
      }));
      list.classList.add('open');
    });
    input.addEventListener('blur', ()=>setTimeout(close,150));
    input.addEventListener('keydown', e=>{ if(e.key==='Escape') close(); });
  });
}

/* ===================== MAP (Leaflet, lazy-loaded) ===================== */
const GROUND_ZERO = {lat:28.330792, lng:-81.608095, label:"⚡ Ground Zero — Acadia Estates, Kissimmee, FL"};
let _map = null;
function loadLeaflet(cb){
  if(window.L) return cb();
  const css = document.createElement('link');
  css.rel = 'stylesheet';
  css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(css);
  const js = document.createElement('script');
  js.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  js.onload = cb;
  js.onerror = ()=>toast('⚠️ Map failed to load — check your connection.');
  document.head.appendChild(js);
}
function initMap(){
  loadLeaflet(()=>buildMap(GROUND_ZERO.lat, GROUND_ZERO.lng, false));
}
function initMapMine(){
  loadLeaflet(()=>{
    if(!navigator.geolocation){ initMap(); return; }
    navigator.geolocation.getCurrentPosition(
      pos=>buildMap(pos.coords.latitude, pos.coords.longitude, true),
      ()=>{ toast('📍 Location unavailable — showing Ground Zero.'); initMap(); }
    );
  });
}
function buildMap(lat,lng,mine){
  const box = document.getElementById('mapBox');
  if(!box) return;
  box.innerHTML = '';
  if(_map){ _map.remove(); _map = null; }
  _map = L.map('mapBox').setView([lat,lng], 15);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(_map);
  L.circle([lat,lng],{radius:1609, color:'#3b2a80', fillColor:'#8b5cf6', fillOpacity:.08, weight:2}).addTo(_map);
  L.marker([lat,lng]).addTo(_map).bindPopup(mine?'<b>You are here</b>':`<b>${GROUND_ZERO.label}</b><br>Where it all starts.`).openPopup();
  // Preview: scatter current filtered listings within the mile circle (deterministic per listing id)
  filteredListings().slice(0,14).forEach(l=>{
    const ang = (l.id % 360) * 2.3998, r = 200 + (l.id * 137 % 1300); // meters
    const dLat = (r*Math.cos(ang))/111320, dLng = (r*Math.sin(ang))/(111320*Math.cos(lat*Math.PI/180));
    L.marker([lat+dLat, lng+dLng]).addTo(_map)
     .bindPopup(`<b>${esc(l.title)}</b><br>${esc(l.price)}<br><a href="#" onclick="openListing('${jsq(String(l.id))}');return false" style="font-weight:700;color:#3b2a80">View listing →</a>`);
  });
}

function renderAuth(){

function sendCode(){
  const input = document.getElementById('authEmail');
  const email = (input.value||'').trim().toLowerCase();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ toast('⚠️ Enter a valid email address.'); return; }
  _authEmail = email;
  _authCode = String(Math.floor(100000 + Math.random()*900000));
  document.getElementById('codeRow').style.display = '';
  modalShell(`<div class="inner" style="padding-top:40px;text-align:center">
    <h3>📬 Check your email</h3>
    <p style="color:var(--muted);margin:10px 0 18px">In production this code is emailed to <b>${esc(email)}</b>.<br>Demo build — here it is:</p>
    <div style="font-family:'Sora';font-size:2.2rem;font-weight:800;letter-spacing:.2em;color:var(--indigo-3);background:#f6f3fc;border-radius:14px;padding:14px">${_authCode}</div>
    <button class="btn btn-gold btn-block" style="margin-top:18px" onclick="closeModal()">Got it</button>
  </div>`);
}
function verifyCode(){
  const code = (document.getElementById('authCode').value||'').trim();
  if(!_authCode || code !== _authCode){ toast('⚠️ Wrong code — check and try again.'); return; }
  loginEmail(_authEmail, null);
}
function socialLogin(provider){
  modalShell(`<div class="inner" style="padding-top:40px">
    <h3>Continue with ${esc(provider)}</h3>
    <p style="color:var(--muted);font-size:.92rem;margin:8px 0 16px">Demo build: enter the email on your ${esc(provider)} account and we'll link it instantly. Production uses real ${esc(provider)} OAuth.</p>
    <div class="fgroup"><label>${esc(provider)} account email</label><input id="socialEmail" type="email" placeholder="you@example.com"></div>
    <button class="btn btn-gold btn-block" onclick="confirmSocial('${provider}')">Link &amp; Sign In</button>
  </div>`);
}
function confirmSocial(provider){
  const email = (document.getElementById('socialEmail').value||'').trim().toLowerCase();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ toast('⚠️ Enter a valid email address.'); return; }
  closeModal();
  loginEmail(email, provider);
}
function loginEmail(email, provider){
  const a = accounts();
  if(!a[email]){
    a[email] = {email, provider, listings:[]};
    // Adopt any profile/listings created in this browser before accounts existed
    try{
      const oldP = JSON.parse(localStorage.getItem('e4e_profile')||'null');
      const oldL = JSON.parse(localStorage.getItem('e4e_listings')||'[]');
      if(oldP) Object.assign(a[email], oldP, {email, provider});
      if(oldL.length) a[email].listings = oldL.map(l=>({...l, who:(oldP&&oldP.name)||l.who}));
      localStorage.removeItem('e4e_profile'); localStorage.removeItem('e4e_listings');
    }catch(err){}
    saveAccounts(a);
  } else if(provider && !a[email].provider){
    a[email].provider = provider; saveAccounts(a);
  }
  localStorage.setItem('e4e_session', email);
  _authCode = null;
  toast(a[email].name ? `⚡ Welcome back, ${a[email].name.split(' ')[0]}!` : '⚡ Signed in! Set up your profile.');
  refreshNavWallet(); render(); window.scrollTo({top:0});
}

function renderTradeGrid(){
  const grid = document.getElementById('tradeGrid');
  if(!grid) return;
  grid.innerHTML = TRADE_CATALOG.slice(0, tradesShown).map(([name,kind],i)=>{
    const sel = selectedTrades.some(t=>t.name===name);
    return `<button type="button" class="trade-btn ${sel?'sel':''}" onclick="toggleTrade(${i})">${esc(name)}</button>`;
  }).join('');
  const more = document.getElementById('showMoreBtn');
  if(more) more.style.display = tradesShown >= TRADE_CATALOG.length ? 'none' : '';
}
function showMoreTrades(){
  tradesShown = Math.min(tradesShown + 12, TRADE_CATALOG.length);
  renderTradeGrid(); // the button sits below the grid, so it lands at the bottom of the longer list
}
function toggleTrade(i){
  const [name,kind] = TRADE_CATALOG[i];
  const at = selectedTrades.findIndex(t=>t.name===name);
  if(at>=0) selectedTrades.splice(at,1);
  else selectedTrades.push({name, kind, qty:1});
  renderTradeBox(); renderTradeGrid();
}
function bumpTrade(idx,d){
  const t = selectedTrades[idx]; if(!t) return;
  t.qty = Math.max(1, Math.min(99, t.qty + d));
  renderTradeBox();
}
function dropTrade(idx){ selectedTrades.splice(idx,1); renderTradeBox(); renderTradeGrid(); }
function renderTradeBox(){
  const box = document.getElementById('tradeBox');
  if(!box) return;
  if(!selectedTrades.length){ box.innerHTML = '<span class="ph">Pick from the community trade list below — your selections appear here.</span>'; return; }
  box.innerHTML = selectedTrades.map((t,idx)=>`
    <div class="trade-row">
      <span class="nm">${esc(t.name)}</span>
      <button type="button" class="qty-btn" onclick="bumpTrade(${idx},-1)">−</button>
      <b>${t.qty}</b> <span style="color:var(--muted)">${TRADE_UNITS[t.kind]}</span>
      <button type="button" class="qty-btn" onclick="bumpTrade(${idx},1)">＋</button>
      <button type="button" class="x" onclick="dropTrade(${idx})" aria-label="Remove">✕</button>
    </div>`).join('');
}
function tradeSummary(){
  return selectedTrades.map(t=>{
    const u = TRADE_UNITS[t.kind];
    if(u==='qty') return `${t.name} ×${t.qty}`;
    return `${t.name} (${t.qty} ${t.qty===1?u.slice(0,-1):u})`;
  }).join(', ');
}

function submitListing(e){
  e.preventDefault();
  const p = myProfile();
  if(!p){ go('profile'); toast('Sign in and set up your profile first — listings are saved to it.'); return; }
  const f = new FormData(e.target);
  const usdVal = Math.round(parseFloat(f.get('usd')));
  const hasCash = !isNaN(usdVal) && usdVal > 0;
  const openBarter = f.get('openBarter') !== 'no';
  const hasTrade = selectedTrades.length > 0;
  if(!hasCash && !hasTrade && !openBarter){ toast('⚠️ Pick at least one trade, allow open barter offers, or set a cash fallback.'); return; }
  const accepts = [];
  if(hasTrade || openBarter) accepts.push(openBarter ? 'barter-open' : 'barter-listed');
  if(hasCash) accepts.push('cash');
  let price = hasTrade ? `Barter: ${tradeSummary()}` : (openBarter ? 'Open to barter offers' : '');
  if(hasCash) price = price ? `${price} — or $${usdVal.toLocaleString()}${f.get('eunit')||''}` : `$${usdVal.toLocaleString()}${f.get('eunit')||''}`;
  const grads = ['var(--grad-purple)','var(--grad-teal)','var(--grad-gold)'];
  saveMyListing({
    id: Date.now(), cat:f.get('cat'), type:({rent:'Rent',buy:'Buy'})[f.get('cat')]||'Barter', title:f.get('title'),
    who: p.name, emoji: f.get('emoji')||'📦', grad: grads[Math.floor(Math.random()*3)],
    loc:f.get('loc'), price, accepts, desc:f.get('desc'), mine:true
  });
  toast('⚡ Listing published! Your energy is live.');
  state.cat = f.get('cat'); state.type='all'; state.q='';
  go('explore');
}

/* ===================== MODALS & TOASTS ===================== */
const modalRoot = document.getElementById('modalRoot');
function closeModal(){ modalRoot.innerHTML=''; }
function modalShell(inner){
  modalRoot.innerHTML = `<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal" style="position:relative"><button class="close" onclick="closeModal()">✕</button>${inner}</div></div>`;
}
function openListing(id){
  const l = allListings().find(x=>String(x.id)===String(id)); if(!l) return;
  const barter = isBarterFriendly(l);
  modalShell(`
    <div class="thumb" style="background:${l.grad}">${l.emoji}</div>
    <div class="inner">
      <span class="cat" style="font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-2)">${CATS[l.cat]?CATS[l.cat].label:esc(l.cat)}</span>
      <h3>${esc(l.title)}</h3>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:14px">📍 ${esc(l.loc)} · by <a onclick="closeModal();openUser('${jsq(l.who)}')" style="text-decoration:underline;cursor:pointer;font-weight:600">${esc(l.who)}</a></p>
      <p style="margin-bottom:18px">${esc(l.desc)}</p>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 18px;background:#f6f3fc;border-radius:14px;margin-bottom:18px">
        <b style="color:${barter?'var(--teal-2)':'var(--indigo-3)'}">${barter?'🤝 ':''}${esc(l.price)}</b>
        ${barter?'<span style="font-size:.8rem;color:var(--muted)">Open to barter — propose a trade!</span>':''}
      </div>
      <button class="btn btn-gold btn-block" onclick="closeModal();openContact('${jsq(l.who)}','${jsq(l.title)}')">Contact / Request Exchange</button>
    </div>`);
}
function openWorkshop(id){
  const w = WORKSHOPS.find(x=>x.id===id); if(!w) return;
  const k = KINDS[w.kind];
  modalShell(`
    <div class="thumb" style="background:${w.grad}">${w.emoji}</div>
    <div class="inner">
      <span class="tag ${k.cls}">${k.lbl}</span>
      <h3>${esc(w.title)}</h3>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:14px">👤 ${esc(w.host)} · 📍 ${esc(w.loc)} · 🗓 ${esc(w.when)}</p>
      <p style="margin-bottom:18px">${esc(w.desc)}</p>
      <div style="padding:14px 18px;background:#f6f3fc;border-radius:14px;margin-bottom:18px"><b style="color:var(--indigo-3)">${esc(w.price)}</b></div>
      <button class="btn btn-gold btn-block" onclick="closeModal();openContact('${jsq(w.host)}','${jsq(w.title)}')">Request a Spot</button>
    </div>`);
}
function openContact(who, about){
  modalShell(`
    <div class="inner" style="padding-top:40px">
      <h3>Message ${esc(who)}</h3>
      <p style="color:var(--muted);font-size:.92rem;margin-bottom:18px">About: <b>${esc(about)}</b></p>
      <form onsubmit="sendMessage(event,'${jsq(who)}')">
        <div class="fgroup"><label>Your message</label><textarea id="reqMsg" required placeholder="Hi! I'm interested in this exchange. Here's what I can offer in return…"></textarea></div>
        <div class="fgroup"><label>What can you offer in exchange? (optional)</label><input id="reqOffer" placeholder="e.g. guitar lessons, fresh vegetables, tool lending…"></div>
        <div class="energy-note" style="margin-bottom:16px">🤝 <b>Barter first:</b> lead with what you can trade — most exchanges here never need a dollar. Cash is always a fine fallback if that's what works for both of you.</div>
        <button class="btn btn-teal btn-block" type="submit">Send Request ⚡</button>
      </form>
    </div>`);
}
function sendMessage(e, who){
  e.preventDefault();
  const m = me();
  if(!m){ closeModal(); go('profile'); toast('Sign in to send requests — exchanges are tied to your profile.'); return; }
  closeModal();
  toast('✉️ Request sent to '+who+'! They\'ll see your message and what you\'re offering.');
}
let toastTimer;
function toast(msg){
  const r = document.getElementById('toastRoot');
  r.innerHTML = `<div class="toast">${msg}</div>`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>r.innerHTML='', 3400);
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

render();
</script>

<script id="cloudMode">
/* ===================== CLOUD MODE (Supabase) =====================
   Activates only when CLOUD config is filled in. Overrides the demo
   data layer with the real backend: accounts, profiles, listings, requests. */
if (CLOUD.supabaseUrl && CLOUD.supabaseAnonKey) (function(){
  const cache = { session:null, me:null, listings:[], booted:false };
  let sb = null;

  function loadScript(src){
    return new Promise((res, rej)=>{
      const s = document.createElement('script');
      s.src = src; s.onload = res; s.onerror = ()=>rej(new Error('load failed: '+src));
      document.head.appendChild(s);
    });
  }
  const uid = ()=>cache.session?.user?.id || null;
  const grads = ['var(--grad-purple)','var(--grad-teal)','var(--grad-gold)'];
  const rowToListing = r => ({ id:r.id, owner:r.owner, cat:r.cat, type:r.type, title:r.title,
    who:r.who||'Member', emoji:r.emoji||'📦',
    grad:grads[Math.abs(String(r.id).split('').reduce((n,c)=>n+c.charCodeAt(0),0))%3],
    loc:r.loc||'', price:r.price||'', accepts:r.accepts||[], desc:r.description||'', mine:r.owner===uid() });

  /* ---- data layer overrides (sync reads from cache) ---- */
  me = function(){ return cache.me; };
  myProfile = function(){ return (cache.me && cache.me.name) ? cache.me : null; };
  myListings = function(){ return cache.listings.filter(l=>l.owner===uid()); };
  communityListings = function(){ return cache.listings; };

  async function refreshData(){
    const { data: ls } = await sb.from('e4e_listings').select('*').order('created_at', {ascending:false});
    cache.listings = (ls||[]).map(rowToListing);
    if (cache.session){
      const { data: prof } = await sb.from('e4e_profiles').select('*').eq('id', uid()).maybeSingle();
      cache.me = { email: cache.session.user.email,
        provider: cache.session.user.app_metadata?.provider !== 'email' ? cache.session.user.app_metadata?.provider : null,
        ...(prof||{}) };
    } else cache.me = null;
    render();
  }

  /* ---- auth overrides ---- */
  sendCode = async function(){
    const email = (document.getElementById('authEmail').value||'').trim().toLowerCase();
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ toast('⚠️ Enter a valid email address.'); return; }
    _authEmail = email;
    const { error } = await sb.auth.signInWithOtp({ email,
      options: { emailRedirectTo: location.origin + location.pathname } });
    if (error){ toast('⚠️ ' + error.message); return; }
    document.getElementById('codeRow').style.display = '';
    toast('📬 Check your email (and spam) — enter the 6-digit code here, or click the link in the email.');
  };
  verifyCode = async function(){
    const code = (document.getElementById('authCode').value||'').trim();
    const { error } = await sb.auth.verifyOtp({ email:_authEmail, token:code, type:'email' });
    if (error){ toast('⚠️ Wrong or expired code — try again.'); return; }
    toast('⚡ Signed in!');
  };
  socialLogin = async function(provider){
    const { error } = await sb.auth.signInWithOAuth({
      provider: provider.toLowerCase(),
      options: { redirectTo: location.origin + location.pathname }
    });
    if (error) toast('⚠️ ' + provider + ' sign-in is not configured yet.');
  };
  signOut = async function(){
    await sb.auth.signOut();
    toast('Signed out. Everything is saved to your account.');
  };
  doDeleteAccount = async function(reason, details){
    const { error } = await sb.rpc('e4e_delete_my_account', { p_reason: reason||null, p_details: details||null });
    if (error){ toast('⚠️ Could not delete: '+error.message); return; }
    closeModal();
    await sb.auth.signOut();
    toast('Account deleted. Take care out there.');
  };
  saveProfile = async function(e){
    e.preventDefault();
    const f = new FormData(e.target);
    const split = s => (s||'').split(',').map(x=>x.trim()).filter(Boolean);
    const { error } = await sb.from('e4e_profiles').upsert({
      id: uid(), name:(f.get('name')||'').slice(0,60), loc:f.get('loc'), emoji:f.get('emoji')||'⚡',
      bio:(f.get('bio')||'').slice(0,400), offers:split(f.get('offers')), wants:split(f.get('wants'))
    });
    if (error){ toast('⚠️ '+error.message); return; }
    toast(state.editProfile ? '✅ Profile updated!' : '⚡ Welcome to the community, '+f.get('name').split(' ')[0]+'!');
    state.editProfile = false;
    await refreshData();
  };

  /* ---- listings ---- */
  saveMyListing = async function(l){
    const { data, error } = await sb.from('e4e_listings').insert({
      owner: uid(), who: cache.me.name, cat:l.cat, type:l.type, title:l.title,
      emoji:l.emoji, loc:l.loc, price:l.price, accepts:l.accepts||[], description:l.desc
    }).select().single();
    if (error){ toast('⚠️ '+error.message); return; }
    cache.listings.unshift(rowToListing(data));
    if (state.page === 'explore' || state.page === 'profile') render();
  };

  /* ---- exchange requests (free — recorded so both sides have a trail) ---- */
  sendMessage = async function(e, who){
    e.preventDefault();
    if(!cache.me){ closeModal(); go('profile'); toast('Sign in to send requests.'); return; }
    const msg = document.getElementById('reqMsg')?.value || '';
    const offer = document.getElementById('reqOffer')?.value || '';
    const { error } = await sb.rpc('e4e_request_exchange', { p_about: who, p_message: msg, p_offer: offer });
    if (error){ toast('⚠️ '+error.message); return; }
    closeModal();
    toast('✉️ Request sent to '+who+'! They\'ll see your message and what you\'re offering.');
  };

  /* ---- boot ---- */
  (async function(){
    try {
      await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js');
      /* Surface sign-in errors delivered in the URL (expired/used links etc.) */
      if (/error/.test(location.hash)) {
        const p = new URLSearchParams(location.hash.slice(1));
        const desc = (p.get('error_description') || p.get('error_code') || 'Sign-in link failed').replace(/\+/g,' ');
        setTimeout(()=>toast('⚠️ ' + desc + ' — request a fresh link and open it in this browser.'), 600);
        history.replaceState(null, '', location.pathname + location.search);
      }
      sb = window.supabase.createClient(CLOUD.supabaseUrl, CLOUD.supabaseAnonKey);
      sb.auth.onAuthStateChange((evt, session)=>{
        const had = !!cache.session;
        cache.session = session;
        if (evt === 'SIGNED_IN' && !had){ cache.freshSignIn = true; toast('⚡ Signed in!'); }
        if (cache.booted && (!!session !== had)) refreshData();
      });
      const { data: { session } } = await sb.auth.getSession();
      cache.session = session;
      await refreshData();
      cache.booted = true;
      if (cache.freshSignIn || (session && /access_token/.test(location.hash))){
        cache.freshSignIn = false; closeModal(); go('profile');
      }
    } catch(err){
      console.error('Cloud boot failed, staying in demo mode:', err);
    }
  })();
})();
</script>
</body>
</html>
